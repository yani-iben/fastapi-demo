# ── 1. Workflow name ─────────────────────────────────────────────
name: Run Tests

# ── 2. Trigger ───────────────────────────────────────────────────
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# ── 3. Jobs ──────────────────────────────────────────────────────
jobs:
  test:
    # ── 4. Runner ──────────────────────────────────────────────
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password

    steps:
      # ── 5. Checkout ──────────────────────────────────────────
      - name: Check out repository
        uses: actions/checkout@v4

      # ── 6. Python setup ──────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 7. Install dependencies ──────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 8. Run tests ─────────────────────────────────────────
      - name: Run pytest
        run: pytest